---
# yamllint disable rule:line-length
name: agnix
'on':
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
jobs:
  agnix:
    timeout-minutes: 15
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - uses: agent-sh/agnix@v0.36.2
        with:
          strict: true
