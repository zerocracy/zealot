---
# yamllint disable rule:line-length
name: dogent
'on':
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
jobs:
  dogent:
    timeout-minutes: 15
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npx @yegor256/dogent@0.6.0 .
