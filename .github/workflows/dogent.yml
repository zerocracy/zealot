---
# yamllint disable rule:line-length
name: dogent
'on':
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
jobs:
  dogent:
    timeout-minutes: 15
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: find . \( -name CLAUDE.md -o -name SKILL.md -o -name AGENTS.md \) -print0 | xargs -0 -r npx @yegor256/dogent@0.1.0
